<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleaning Verification</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --pass: #22c55e;
      --fail: #ef4444;
      --warn: #f59e0b;
      --pending: #6366f1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.75rem;
      font-weight: 700;
    }

    header p {
      margin: 0;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 640px) {
      .upload-grid { grid-template-columns: 1fr; }
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.06);
    }

    .dropzone.has-file {
      border-style: solid;
      border-color: var(--accent);
    }

    .dropzone img {
      max-width: 100%;
      max-height: 140px;
      border-radius: 6px;
      object-fit: contain;
    }

    .dropzone .placeholder {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .dropzone .filename {
      font-size: 0.85rem;
      word-break: break-all;
    }

    input[type="file"] { display: none; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    button {
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.04);
    }

    .status-bar {
      display: none;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .status-bar.visible { display: flex; }

    .status-bar.info {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.35);
    }

    .status-bar.error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge.pass { background: rgba(34, 197, 94, 0.2); color: var(--pass); }
    .badge.fail { background: rgba(239, 68, 68, 0.2); color: var(--fail); }
    .badge.review { background: rgba(245, 158, 11, 0.2); color: var(--warn); }
    .badge.pending { background: rgba(99, 102, 241, 0.2); color: var(--pending); }
    .badge.invalid { background: rgba(239, 68, 68, 0.15); color: #f87171; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .metric {
      background: var(--bg);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }

    .metric .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .metric .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .issues {
      margin: 0 0 1rem;
      padding-left: 1.25rem;
      color: var(--muted);
    }

    .issues li { margin-bottom: 0.25rem; }

    .reason {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    pre.json {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      font-size: 0.78rem;
      line-height: 1.45;
      margin: 0;
      max-height: 320px;
    }

    #result-section { display: none; }
    #result-section.visible { display: block; }

    .ref-status {
      font-size: 0.85rem;
      color: var(--pass);
      margin-top: 0.5rem;
      min-height: 1.25rem;
    }

    .ref-status.pending { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Cleaning Verification</h1>
      <p>Upload a reference image, then a task completion photo, and compare them with AI.</p>
    </header>

    <div class="card">
      <h2>Settings</h2>
      <div class="fields">
        <div>
          <label for="facility-id">Facility ID</label>
          <input type="number" id="facility-id" value="42" min="1" />
        </div>
        <div>
          <label for="template-id">Template ID</label>
          <input type="number" id="template-id" value="168" min="1" />
        </div>
        <div>
          <label for="task-id">Task ID</label>
          <input type="number" id="task-id" value="9001" min="1" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Images</h2>
      <div class="upload-grid">
        <div>
          <label>Reference image (clean baseline)</label>
          <div class="dropzone" id="ref-dropzone" tabindex="0" role="button" aria-label="Upload reference image">
            <span class="placeholder">Click or drop reference image</span>
          </div>
          <input type="file" id="ref-file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" />
          <div class="ref-status pending" id="ref-status">No reference uploaded yet</div>
        </div>
        <div>
          <label>Task image (completion photo)</label>
          <div class="dropzone" id="task-dropzone" tabindex="0" role="button" aria-label="Upload task image">
            <span class="placeholder">Click or drop task image</span>
          </div>
          <input type="file" id="task-file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" />
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn-secondary" id="btn-upload-ref">Upload Reference</button>
        <button type="button" class="btn-primary" id="btn-compare">Compare &amp; Verify</button>
        <button type="button" class="btn-secondary" id="btn-reset">Reset</button>
      </div>
    </div>

    <div class="status-bar info" id="status-bar">
      <div class="spinner" id="status-spinner"></div>
      <span id="status-text">Working…</span>
    </div>

    <div class="card" id="result-section">
      <div class="result-header">
        <h2 style="margin:0">Result</h2>
        <span class="badge pending" id="result-badge">—</span>
      </div>
      <div class="metrics" id="metrics"></div>
      <p class="reason" id="rule-reason"></p>
      <ul class="issues" id="issues-list" hidden></ul>
      <pre class="json" id="result-json"></pre>
    </div>
  </div>

  <script>
    const refDropzone = document.getElementById('ref-dropzone');
    const taskDropzone = document.getElementById('task-dropzone');
    const refFileInput = document.getElementById('ref-file');
    const taskFileInput = document.getElementById('task-file');
    const refStatus = document.getElementById('ref-status');
    const statusBar = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const statusSpinner = document.getElementById('status-spinner');
    const resultSection = document.getElementById('result-section');
    const resultBadge = document.getElementById('result-badge');
    const metricsEl = document.getElementById('metrics');
    const ruleReasonEl = document.getElementById('rule-reason');
    const issuesList = document.getElementById('issues-list');
    const resultJson = document.getElementById('result-json');

    let refFile = null;
    let taskFile = null;
    let referenceUploaded = false;
    let referenceId = null;

    function setupDropzone(dropzone, input, onSelect) {
      dropzone.addEventListener('click', () => input.click());
      dropzone.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          input.click();
        }
      });
      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) onSelect(file);
      });
      input.addEventListener('change', () => {
        if (input.files[0]) onSelect(input.files[0]);
      });
    }

    function previewFile(dropzone, file) {
      dropzone.classList.add('has-file');
      dropzone.innerHTML = '';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = file.name;
      dropzone.appendChild(img);
      const name = document.createElement('div');
      name.className = 'filename';
      name.textContent = file.name;
      dropzone.appendChild(name);
    }

    setupDropzone(refDropzone, refFileInput, (file) => {
      refFile = file;
      referenceUploaded = false;
      referenceId = null;
      refStatus.textContent = 'Reference selected — click Upload Reference or Compare';
      refStatus.className = 'ref-status pending';
      previewFile(refDropzone, file);
    });

    setupDropzone(taskDropzone, taskFileInput, (file) => {
      taskFile = file;
      previewFile(taskDropzone, file);
    });

    function getSettings() {
      return {
        facilityId: Number(document.getElementById('facility-id').value),
        templateId: Number(document.getElementById('template-id').value),
        taskId: Number(document.getElementById('task-id').value),
      };
    }

    function setBusy(busy, message, isError) {
      statusBar.classList.toggle('visible', busy || isError);
      statusBar.classList.toggle('info', busy && !isError);
      statusBar.classList.toggle('error', isError);
      statusSpinner.style.display = busy && !isError ? 'block' : 'none';
      statusText.textContent = message || '';
      document.getElementById('btn-upload-ref').disabled = busy;
      document.getElementById('btn-compare').disabled = busy;
    }

    async function parseResponse(res) {
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) {
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      return data;
    }

    async function uploadReference() {
      if (!refFile) throw new Error('Please select a reference image first.');
      const { facilityId, templateId } = getSettings();
      const form = new FormData();
      form.append('image', refFile);
      form.append('facility_id', String(facilityId));
      form.append('template_id', String(templateId));
      form.append('label', 'ui-reference');

      const res = await fetch('/api/admin/upload-reference', { method: 'POST', body: form });
      const data = await parseResponse(res);
      referenceUploaded = true;
      referenceId = data.results.id;
      refStatus.textContent = `Reference uploaded (id: ${referenceId})`;
      refStatus.className = 'ref-status';
      return data.results;
    }

    async function uploadTask() {
      if (!taskFile) throw new Error('Please select a task image first.');
      const { facilityId, templateId, taskId } = getSettings();
      const form = new FormData();
      form.append('image', taskFile);
      form.append('task_id', String(taskId));
      form.append('facility_id', String(facilityId));
      form.append('template_id', String(templateId));
      form.append('janitor_id', 'ui-demo');

      const res = await fetch('/api/janitor/upload-completion', { method: 'POST', body: form });
      const data = await parseResponse(res);
      return data.results;
    }

    async function pollResult(taskId, maxAttempts = 60) {
      for (let i = 0; i < maxAttempts; i++) {
        const res = await fetch(`/api/tasks/${taskId}/result`);
        if (res.status === 404) {
          await sleep(1500);
          continue;
        }
        const data = await parseResponse(res);
        const status = data.results.status;
        setBusy(true, `Processing… (${status})`);
        if (status !== 'PENDING' && status !== 'PROCESSING') {
          return data.results;
        }
        await sleep(1500);
      }
      throw new Error('Timed out waiting for verification result. Is the worker running?');
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }

    function badgeClass(status) {
      if (status === 'PASS') return 'pass';
      if (status === 'FAIL' || status === 'INVALID_TASK') return status === 'INVALID_TASK' ? 'invalid' : 'fail';
      if (status === 'MANUAL_REVIEW') return 'review';
      return 'pending';
    }

    function fmtPct(value) {
      if (value == null || Number.isNaN(value)) return '—';
      return `${Number(value).toFixed(1)}%`;
    }

    function showResult(result) {
      resultSection.classList.add('visible');
      const status = result.status || 'UNKNOWN';
      resultBadge.textContent = status;
      resultBadge.className = `badge ${badgeClass(status)}`;

      const metrics = [];
      if (result.overall_percent != null) metrics.push({ label: 'Overall', value: fmtPct(result.overall_percent) });
      if (result.cleanliness_percent != null) metrics.push({ label: 'Cleanliness', value: fmtPct(result.cleanliness_percent) });
      if (result.scene_match_percent != null) metrics.push({ label: 'Scene match', value: fmtPct(result.scene_match_percent) });
      if (result.similarity_score != null) metrics.push({ label: 'Similarity', value: (result.similarity_score * 100).toFixed(1) + '%' });
      if (result.vision?.score != null) metrics.push({ label: 'Vision score', value: fmtPct(result.vision.score) });
      if (result.vision?.confidence != null) metrics.push({ label: 'Confidence', value: fmtPct(result.vision.confidence) });

      metricsEl.innerHTML = metrics
        .map((m) => `<div class="metric"><div class="value">${m.value}</div><div class="label">${m.label}</div></div>`)
        .join('');

      ruleReasonEl.textContent = result.rule_reason || result.error_message || '';
      const issues = result.vision?.issues || [];
      if (issues.length) {
        issuesList.hidden = false;
        issuesList.innerHTML = issues.map((i) => `<li>${escapeHtml(i)}</li>`).join('');
      } else {
        issuesList.hidden = true;
        issuesList.innerHTML = '';
      }

      resultJson.textContent = JSON.stringify(result, null, 2);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('btn-upload-ref').addEventListener('click', async () => {
      try {
        setBusy(true, 'Uploading reference image…');
        await uploadReference();
        setBusy(false);
      } catch (err) {
        setBusy(false, err.message, true);
      }
    });

    document.getElementById('btn-compare').addEventListener('click', async () => {
      try {
        resultSection.classList.remove('visible');
        if (!refFile) throw new Error('Please select a reference image.');
        if (!taskFile) throw new Error('Please select a task image.');

        if (!referenceUploaded) {
          setBusy(true, 'Uploading reference image…');
          await uploadReference();
        }

        setBusy(true, 'Uploading task image and queuing verification…');
        const upload = await uploadTask();

        setBusy(true, 'Waiting for AI verification…');
        const result = await pollResult(upload.task_id);
        showResult(result);
        setBusy(false);
      } catch (err) {
        setBusy(false, err.message, true);
      }
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      refFile = null;
      taskFile = null;
      referenceUploaded = false;
      referenceId = null;
      refFileInput.value = '';
      taskFileInput.value = '';
      refDropzone.classList.remove('has-file');
      taskDropzone.classList.remove('has-file');
      refDropzone.innerHTML = '<span class="placeholder">Click or drop reference image</span>';
      taskDropzone.innerHTML = '<span class="placeholder">Click or drop task image</span>';
      refStatus.textContent = 'No reference uploaded yet';
      refStatus.className = 'ref-status pending';
      resultSection.classList.remove('visible');
      setBusy(false);
    });
  </script>
</body>
</html>
